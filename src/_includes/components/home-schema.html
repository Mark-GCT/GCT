<script type="application/ld+json">
    {
        "@context": "http://schema.org",
        "@type": ["LocalBusiness", "ProfessionalService"],
        "name": "{{ client.name }}",
        "url": "https://gatewaycornerstone.com",
        "logo": "https://gatewaycornerstone.com/assets/images/logo.png",
        "description": "Veteran-owned custom web design agency based in the St. Louis, MO metro area. We hand-code fast, secure, beautiful websites for small businesses and faith-based organizations.",
        "priceRange": "$$",
        "areaServed": {
            "@type": "Country",
            "name": "United States",
            },
        "geo": {
            "@type": "GeoCoordinates",
            "latitude": 38.6270,
            "longitude": -90.1994,
            },
        "openingHours": "Mo-Fr 09:00-17:00",
        {% if preloadImg %}"image": "{{ client.domain }}{{ preloadImg }}",{% endif %}
        {% if client.phoneFormatted %}"telephone": "{{ client.phoneFormatted }}",{% endif %}
        {% if client.email %}"email": "{{ client.email }}",{% endif %}
        {% if client.address %}
            "address": {
                "@type": "PostalAddress" {%- if client.address.lineOne -%},
                    "streetAddress": "{{ client.address.lineOne }}{% if client.address.lineTwo %}, {{ client.address.lineTwo }}{% endif %}",
                {%- endif -%}
                {%- if client.address.city -%},
                    "addressLocality": "{{ client.address.city }}",
                {%- endif -%}
                {%- if client.address.state -%},
                    "addressRegion": "{{ client.address.state }}",
                {%- endif -%}
                {%- if client.address.zip -%},
                    "postalCode": "{{ client.address.zip }}",
                {%- endif -%}
                {%- if client.address.country -%},
                    "addressCountry": "{{ client.address.country }}",
                {%- endif -%}
            },
        {% endif %}
        {% if client.domain and page.url %}"url": "{{ client.domain }}{{ page.url }}",{% endif %}
        {% if client.socials %}
            "sameAs": [{%- for platform, url in client.socials -%}
                    {% if not loop.first %},{% endif %}"{{ url }}",
                {%- endfor -%}],
        {% endif %}
        "founder": {
            "@type": "Person",
            "name": "Mark Elmore",
            "jobTitle": "Owner & Lead Developer",
            "description": "15+ years in IT, U.S. veteran, and founder of Gateway Cornerstone Web Design.",
            "sameAs": "https://gatewaycornerstone.com/about/",
            },
        "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Web Design Services",
            "itemListElement": [{
                "@type": "Offer",
                "name": "Monthly Web Design Plan",
                "price": "150.00",
                "priceCurrency": "USD",
                "description": "Custom-coded 5-page website including hosting, unlimited edits, and 24/7 support.",
                "billingIncrement": "month",
                },
                {
                    "@type": "Offer",
                    "name": "Lump Sum Website Package",
                    "price": "3000.00",
                    "priceCurrency": "USD",
                    "description": "Custom-coded 5-page website with $25/month hosting."
                },
                {
                    "@type": "Offer",
                    "name": "E-Commerce Website",
                    "price": "10000.00",
                    "priceCurrency": "USD",
                    "description": "Custom Shopify e-commerce store up to 15 pages with integrated shipping."
                },
            ]
        }
             
    }
</script>
